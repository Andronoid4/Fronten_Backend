version: "3.8"

services:
  backend1:
    build: ./backend
    environment:
      - PORT=3000
      - INSTANCE_ID=backend-1
    networks:
      - app-net

  backend2:
    build: ./backend
    environment:
      - PORT=3000
      - INSTANCE_ID=backend-2
    networks:
      - app-net

  backend3:
    build: ./backend
    environment:
      - PORT=3000
      - INSTANCE_ID=backend-3-backup
    networks:
      - app-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3
    networks:
      - app-net

  haproxy:
    image: haproxy:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - backend1
      - backend2
      - backend3
    networks:
      - app-net

networks:
  app-net:
    driver: bridge