<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заметки офлайн — PWA</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./icons/icon-152x152.png">
    <link rel="icon" href="./icons/favicon.ico" type="image/x-icon">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Хедер с кнопкой -->
    <header class="app-header">
        <div class="header-content">
            <h1>📌 Мои Заметки</h1>
            <div class="connection-status">
                <span id="status-indicator" class="status-dot online"></span>
                <span id="status-text">Онлайн</span>
            </div>
        </div>
        
        <!-- Навигация -->
        <nav class="tabs">
            <button id="home-btn" class="tab active" data-page="home">Главная</button>
            <button id="about-btn" class="tab" data-page="about">О приложении</button>
        </nav>
        
        <!-- ✅ КНОПКА НОВОЙ ЗАМЕТКИ -->
        <button id="add-note-btn" class="primary-btn">+ Новая заметка</button>
    </header>

    <!-- Динамический контент -->
    <main id="app-content" class="container"></main>

    <!-- Футер -->
    <footer class="app-footer">
        <button id="enable-push" class="btn-push">🔔 Включить уведомления</button>
        <button id="disable-push" class="btn-push hidden">🔕 Отключить уведомления</button>
        <p class="footer-text">💾 Работает офлайн • 🔄 Синхронизация в реальном времени</p>
    </footer>

    <!-- Модальное окно -->
    <div id="note-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Новая заметка</h2>
                <button id="close-modal" class="close-btn">&times;</button>
            </div>
            <form id="note-form">
                <input type="hidden" id="note-id">
                <div class="form-group">
                    <label for="note-title">Заголовок</label>
                    <input type="text" id="note-title" placeholder="Введите заголовок..." required>
                </div>
                <div class="form-group">
                    <label for="note-content">Содержимое</label>
                    <textarea id="note-content" placeholder="Введите текст заметки..." rows="6" required></textarea>
                </div>
                <div class="form-group">
                    <label for="note-color">Цвет заметки</label>
                    <div class="color-picker">
                        <button type="button" class="color-option selected" data-color="#ffffff"></button>
                        <button type="button" class="color-option" data-color="#fef3c7"></button>
                        <button type="button" class="color-option" data-color="#d1fae5"></button>
                        <button type="button" class="color-option" data-color="#dbeafe"></button>
                        <button type="button" class="color-option" data-color="#fce7f3"></button>
                        <button type="button" class="color-option" data-color="#f3e8ff"></button>
                    </div>
                    <input type="hidden" id="note-color" value="#ffffff">
                </div>
                <div class="modal-actions">
                    <button type="button" id="delete-note" class="danger-btn hidden">Удалить</button>
                    <button type="submit" class="primary-btn">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="./app.js"></script>
</body>
</html>
